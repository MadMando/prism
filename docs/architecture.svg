<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 440" font-family="'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <!-- Arrow markers -->
    <marker id="aGray"   markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#484f58"/></marker>
    <marker id="aGreen"  markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#22c55e"/></marker>
    <marker id="aBlue"   markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/></marker>
    <marker id="aRed"    markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#f87171"/></marker>
    <marker id="aYellow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#fbbf24"/></marker>
    <marker id="aPurple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#c084fc"/></marker>
    <marker id="aOrange" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#fb923c"/></marker>
    <marker id="aCyan"   markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#22d3ee"/></marker>
    <marker id="aSeedBlue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto"><polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/></marker>
    <!-- Node gradients -->
    <radialGradient id="gSeed" cx="35%" cy="30%"><stop offset="0%" stop-color="#93c5fd"/><stop offset="100%" stop-color="#1d4ed8"/></radialGradient>
    <radialGradient id="gHigh" cx="35%" cy="30%"><stop offset="0%" stop-color="#86efac"/><stop offset="100%" stop-color="#15803d"/></radialGradient>
    <radialGradient id="gMed"  cx="35%" cy="30%"><stop offset="0%" stop-color="#d8b4fe"/><stop offset="100%" stop-color="#6d28d9"/></radialGradient>
    <radialGradient id="gLow"  cx="35%" cy="30%"><stop offset="0%" stop-color="#94a3b8"/><stop offset="100%" stop-color="#334155"/></radialGradient>
    <!-- Glow filters -->
    <filter id="fSeed" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.18  0 0 0 0 0.42  0 0 0 0 0.96  0 0 0 0.7 0" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="fHigh" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="4" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.08  0 0 0 0 0.60  0 0 0 0 0.16  0 0 0 0.6 0" result="cb"/>
      <feMerge><feMergeNode in="cb"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Background subtle grid pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#161b22" stroke-width="0.6"/>
    </pattern>
  </defs>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- BACKGROUND                                                     -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect width="1100" height="440" fill="#0d1117"/>
  <rect width="1100" height="440" fill="url(#grid)" opacity="0.6"/>

  <!-- Top bar accent -->
  <rect width="1100" height="3" fill="#1d4ed8" opacity="0.6"/>

  <!-- Section tint panels -->
  <rect x="0"   y="0" width="225" height="440" fill="#1d4ed8" opacity="0.03" rx="0"/>
  <rect x="225" y="0" width="540" height="440" fill="#ffffff"  opacity="0.01" rx="0"/>
  <rect x="765" y="0" width="335" height="440" fill="#22c55e"  opacity="0.02" rx="0"/>

  <!-- Vertical dividers -->
  <line x1="225" y1="65" x2="225" y2="415" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="765" y1="65" x2="765" y2="415" stroke="#21262d" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- HEADER                                                         -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <text x="550" y="32" text-anchor="middle" fill="#e6edf3" font-size="17" font-weight="700" letter-spacing="5">PRISM</text>
  <text x="550" y="52" text-anchor="middle" fill="#484f58" font-size="10" letter-spacing="1">PROPAGATION · RETRIEVAL · INFORMED SEMANTIC MAPPING</text>

  <!-- Section headers -->
  <text x="112"  y="72" text-anchor="middle" fill="#3b82f6" font-size="9" font-weight="700" letter-spacing="2" opacity="0.8">① SEED</text>
  <text x="495"  y="72" text-anchor="middle" fill="#6b7280" font-size="9" font-weight="700" letter-spacing="2">② ACTIVATE</text>
  <text x="932"  y="72" text-anchor="middle" fill="#22c55e" font-size="9" font-weight="700" letter-spacing="2" opacity="0.8">③ STRUCTURE</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- LEFT SECTION — QUERY + VECTOR SEARCH                          -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Query box -->
  <rect x="18" y="148" width="138" height="56" rx="8" fill="#161b22" stroke="#30363d" stroke-width="1.5"/>
  <text x="87" y="168" text-anchor="middle" fill="#8b949e" font-size="8" font-weight="700" letter-spacing="1.5">QUERY</text>
  <text x="87" y="184" text-anchor="middle" fill="#c9d1d9" font-size="10" font-style="italic">"how does A affect B?"</text>
  <text x="87" y="197" text-anchor="middle" fill="#484f58" font-size="8">↓ embed</text>

  <!-- Dashed embed arrow -->
  <path d="M 156 176 C 175 176 180 190 195 195" stroke="#3b82f6" stroke-width="1.2" fill="none" stroke-dasharray="3,3" marker-end="url(#aSeedBlue)" opacity="0.6"/>

  <!-- Vector store cylinder -->
  <ellipse cx="205" cy="112" rx="22" ry="6"  fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <rect    x="183"  y="112" width="44" height="24" fill="#161b22" stroke="#30363d" stroke-width="1.2"/>
  <ellipse cx="205" cy="136" rx="22" ry="6"  fill="#1c2128" stroke="#30363d" stroke-width="1.2"/>
  <text x="205" y="127" text-anchor="middle" fill="#8b949e" font-size="8">vector</text>
  <text x="205" y="137" text-anchor="middle" fill="#8b949e" font-size="8">store</text>

  <!-- Seed lines out of vector store with scores -->
  <path d="M 225 130 C 255 135 280 175 313 218" stroke="#3b82f6" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#aSeedBlue)" opacity="0.7"/>
  <path d="M 225 125 C 265 110 280 140 295 170" stroke="#3b82f6" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#aSeedBlue)" opacity="0.6"/>
  <path d="M 225 135 C 260 155 270 220 278 268" stroke="#3b82f6" stroke-width="1.3" fill="none" stroke-dasharray="3,2" marker-end="url(#aSeedBlue)" opacity="0.5"/>
  <text x="245" y="165" fill="#3b82f6" font-size="8" opacity="0.85">0.91</text>
  <text x="250" y="140" fill="#3b82f6" font-size="8" opacity="0.75">0.87</text>
  <text x="248" y="215" fill="#3b82f6" font-size="8" opacity="0.65">0.82</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CENTER — EPISTEMIC GRAPH + SPREADING ACTIVATION               -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- Activation ripple rings from seed nodes (drawn first, behind everything) -->
  <circle cx="330" cy="222" r="35" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.25"/>
  <circle cx="330" cy="222" r="55" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.12"/>
  <circle cx="330" cy="222" r="78" fill="none" stroke="#1d4ed8" stroke-width="0.3" opacity="0.06"/>
  <circle cx="298" cy="298" r="28" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.22"/>
  <circle cx="298" cy="298" r="48" fill="none" stroke="#1d4ed8" stroke-width="0.5" opacity="0.10"/>
  <circle cx="370" cy="148" r="30" fill="none" stroke="#1d4ed8" stroke-width="0.8" opacity="0.22"/>
  <circle cx="370" cy="148" r="52" fill="none" stroke="#1d4ed8" stroke-width="0.4" opacity="0.10"/>

  <!-- ── EDGES (behind nodes) ── -->

  <!-- S1 → A1 : supports (green) THICK — convergence edge 1 -->
  <path d="M 348 212 Q 387 178 432 195" stroke="#22c55e" stroke-width="2.2" fill="none" opacity="0.85" marker-end="url(#aGreen)"/>
  <!-- S2 → A1 : supports (green) THICK — convergence edge 2 -->
  <path d="M 312 287 Q 358 250 430 202" stroke="#22c55e" stroke-width="2.2" fill="none" opacity="0.85" marker-end="url(#aGreen)"/>
  <!-- supports label (between the two) -->
  <text x="376" y="218" fill="#22c55e" font-size="8" opacity="0.75" font-weight="600">supports</text>

  <!-- S1 → A2 : derives_from (blue) -->
  <path d="M 340 232 Q 395 265 478 272" stroke="#60a5fa" stroke-width="1.6" fill="none" opacity="0.75" marker-end="url(#aBlue)"/>
  <text x="388" y="265" fill="#60a5fa" font-size="8" opacity="0.7">derives_from</text>

  <!-- S2 → A3 : qualifies (yellow) -->
  <path d="M 300 308 Q 345 335 403 328" stroke="#fbbf24" stroke-width="1.5" fill="none" opacity="0.75" marker-end="url(#aYellow)"/>
  <text x="334" y="348" fill="#fbbf24" font-size="8" opacity="0.7">qualifies</text>

  <!-- A1 → A4 : implements (purple) -->
  <path d="M 452 193 Q 510 178 558 188" stroke="#c084fc" stroke-width="1.5" fill="none" opacity="0.75" marker-end="url(#aPurple)"/>
  <text x="502" y="173" fill="#c084fc" font-size="8" opacity="0.7">implements</text>

  <!-- A2 → A5 : refutes (red) -->
  <path d="M 491 280 Q 520 308 545 320" stroke="#f87171" stroke-width="1.5" fill="none" opacity="0.75" marker-end="url(#aRed)"/>
  <text x="493" y="316" fill="#f87171" font-size="8" opacity="0.7">refutes</text>

  <!-- S3 → A6 : supersedes (orange) -->
  <path d="M 386 144 Q 485 118 584 140" stroke="#fb923c" stroke-width="1.5" fill="none" opacity="0.70" marker-end="url(#aOrange)"/>
  <text x="480" y="114" fill="#fb923c" font-size="8" opacity="0.7">supersedes</text>

  <!-- A4 → A7 : specializes (cyan) -->
  <path d="M 572 198 Q 618 218 638 252" stroke="#22d3ee" stroke-width="1.4" fill="none" opacity="0.65" marker-end="url(#aCyan)"/>
  <text x="612" y="228" fill="#22d3ee" font-size="8" opacity="0.65">specializes</text>

  <!-- ── NODES ── -->

  <!-- Seed S1 — largest, brightest blue glow -->
  <circle cx="330" cy="222" r="21" fill="url(#gSeed)" filter="url(#fSeed)"/>
  <text x="330" y="226" text-anchor="middle" fill="white" font-size="10" font-weight="700">S₁</text>

  <!-- Seed S2 -->
  <circle cx="298" cy="298" r="18" fill="url(#gSeed)" filter="url(#fSeed)"/>
  <text x="298" y="302" text-anchor="middle" fill="white" font-size="10" font-weight="700">S₂</text>

  <!-- Seed S3 -->
  <circle cx="370" cy="148" r="18" fill="url(#gSeed)" filter="url(#fSeed)"/>
  <text x="370" y="152" text-anchor="middle" fill="white" font-size="10" font-weight="700">S₃</text>

  <!-- A1 — HIGH CONVERGENCE (reached from both S1 and S2) green glow -->
  <circle cx="443" cy="197" r="19" fill="url(#gHigh)" filter="url(#fHigh)"/>
  <text x="443" y="201" text-anchor="middle" fill="white" font-size="9" font-weight="700">A₁</text>
  <!-- Convergence badge -->
  <circle cx="459" cy="181" r="8" fill="#0d1117" stroke="#22c55e" stroke-width="1.2"/>
  <text x="459" y="184" text-anchor="middle" fill="#22c55e" font-size="7" font-weight="700">×2</text>

  <!-- A2 — medium, purple -->
  <circle cx="490" cy="274" r="15" fill="url(#gMed)"/>
  <text x="490" y="278" text-anchor="middle" fill="white" font-size="9">A₂</text>

  <!-- A3 — qualifying, yellowish border -->
  <circle cx="415" cy="328" r="13" fill="#1a1607" stroke="#fbbf24" stroke-width="1.5"/>
  <text x="415" y="332" text-anchor="middle" fill="#fbbf24" font-size="9">A₃</text>

  <!-- A4 — implements chain -->
  <circle cx="568" cy="191" r="14" fill="url(#gMed)" opacity="0.85"/>
  <text x="568" y="195" text-anchor="middle" fill="white" font-size="9">A₄</text>

  <!-- A5 — refutes, red border = contrasting bucket -->
  <circle cx="553" cy="325" r="12" fill="#200a0a" stroke="#f87171" stroke-width="1.5"/>
  <text x="553" y="329" text-anchor="middle" fill="#f87171" font-size="9">A₅</text>

  <!-- A6 — superseded, orange border -->
  <circle cx="592" cy="143" r="12" fill="#1c1005" stroke="#fb923c" stroke-width="1.5"/>
  <text x="592" y="147" text-anchor="middle" fill="#fb923c" font-size="9">A₆</text>

  <!-- A7 — dim, far propagation -->
  <circle cx="645" cy="258" r="11" fill="url(#gLow)" opacity="0.7"/>
  <text x="645" y="262" text-anchor="middle" fill="#94a3b8" font-size="9">A₇</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- CONVERGENCE ARROW to result section                           -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <path d="M 690 225 L 755 225" stroke="#374151" stroke-width="2" fill="none" marker-end="url(#aGray)"/>
  <text x="722" y="218" text-anchor="middle" fill="#484f58" font-size="8">score</text>
  <text x="722" y="229" text-anchor="middle" fill="#484f58" font-size="8">+ bucket</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- RIGHT SECTION — RESULT BUCKETS                                -->
  <!-- ═══════════════════════════════════════════════════════════════ -->

  <!-- PRIMARY -->
  <rect x="778" y="90" width="308" height="50" rx="7" fill="#0a1f12" stroke="#22c55e" stroke-width="1.8"/>
  <rect x="778" y="90" width="4"   height="50" rx="2" fill="#22c55e"/>
  <text x="796" y="111" fill="#22c55e"  font-size="11" font-weight="700">PRIMARY</text>
  <text x="796" y="128" fill="#8b949e" font-size="9">Core chunks · highest convergence score</text>

  <!-- SUPPORTING -->
  <rect x="778" y="148" width="308" height="46" rx="7" fill="#0a1020" stroke="#60a5fa" stroke-width="1.4"/>
  <rect x="778" y="148" width="4"   height="46" rx="2" fill="#60a5fa"/>
  <text x="796" y="167" fill="#60a5fa"  font-size="11" font-weight="700">SUPPORTING</text>
  <text x="796" y="183" fill="#8b949e" font-size="9">Reinforces or extends the primary answer</text>

  <!-- CONTRASTING -->
  <rect x="778" y="202" width="308" height="46" rx="7" fill="#200d0d" stroke="#f87171" stroke-width="1.4"/>
  <rect x="778" y="202" width="4"   height="46" rx="2" fill="#f87171"/>
  <text x="796" y="221" fill="#f87171"  font-size="11" font-weight="700">CONTRASTING</text>
  <text x="796" y="237" fill="#8b949e" font-size="9">Challenges or offers a different perspective</text>

  <!-- QUALIFYING -->
  <rect x="778" y="256" width="308" height="46" rx="7" fill="#1a1806" stroke="#fbbf24" stroke-width="1.4"/>
  <rect x="778" y="256" width="4"   height="46" rx="2" fill="#fbbf24"/>
  <text x="796" y="275" fill="#fbbf24"  font-size="11" font-weight="700">QUALIFYING</text>
  <text x="796" y="291" fill="#8b949e" font-size="9">Conditions, exceptions, nuances</text>

  <!-- SUPERSEDED -->
  <rect x="778" y="310" width="308" height="46" rx="7" fill="#14100a" stroke="#fb923c" stroke-width="1.2" opacity="0.85"/>
  <rect x="778" y="310" width="4"   height="46" rx="2" fill="#fb923c" opacity="0.85"/>
  <text x="796" y="329" fill="#fb923c"  font-size="11" font-weight="700" opacity="0.85">SUPERSEDED</text>
  <text x="796" y="345" fill="#8b949e" font-size="9" opacity="0.8">Historically relevant · now outdated</text>

  <!-- ═══════════════════════════════════════════════════════════════ -->
  <!-- BOTTOM LEGEND                                                  -->
  <!-- ═══════════════════════════════════════════════════════════════ -->
  <rect x="0" y="390" width="1100" height="50" fill="#0a0e13"/>
  <line x1="0" y1="390" x2="1100" y2="390" stroke="#21262d" stroke-width="1"/>

  <text x="32" y="411" fill="#484f58" font-size="8" font-weight="700" letter-spacing="1.5">EDGE TYPES</text>

  <!-- Legend items — colored lines + labels -->
  <line x1="32"  y1="427" x2="54"  y2="427" stroke="#22c55e" stroke-width="2" marker-end="url(#aGreen)"/>
  <text x="58"   y="430" fill="#7d8590" font-size="8">supports</text>

  <line x1="118" y1="427" x2="140" y2="427" stroke="#f87171" stroke-width="2" marker-end="url(#aRed)"/>
  <text x="144"  y="430" fill="#7d8590" font-size="8">refutes</text>

  <line x1="194" y1="427" x2="216" y2="427" stroke="#fb923c" stroke-width="2" marker-end="url(#aOrange)"/>
  <text x="220"  y="430" fill="#7d8590" font-size="8">supersedes</text>

  <line x1="294" y1="427" x2="316" y2="427" stroke="#60a5fa" stroke-width="2" marker-end="url(#aBlue)"/>
  <text x="320"  y="430" fill="#7d8590" font-size="8">derives_from</text>

  <line x1="400" y1="427" x2="422" y2="427" stroke="#c084fc" stroke-width="2" marker-end="url(#aPurple)"/>
  <text x="426"  y="430" fill="#7d8590" font-size="8">implements</text>

  <line x1="502" y1="427" x2="524" y2="427" stroke="#22d3ee" stroke-width="2" marker-end="url(#aCyan)"/>
  <text x="528"  y="430" fill="#7d8590" font-size="8">specializes</text>

  <line x1="600" y1="427" x2="622" y2="427" stroke="#fbbf24" stroke-width="2" marker-end="url(#aYellow)"/>
  <text x="626"  y="430" fill="#7d8590" font-size="8">qualifies</text>

  <line x1="682" y1="427" x2="704" y2="427" stroke="#fb923c" stroke-width="2" marker-end="url(#aOrange)" stroke-dasharray="3,2"/>
  <text x="708"  y="430" fill="#7d8590" font-size="8">generalizes / exemplifies / contrasts_with</text>

  <!-- Convergence callout -->
  <text x="940" y="411" fill="#22c55e" font-size="8" font-weight="700">×2 = CONVERGENCE</text>
  <text x="940" y="427" fill="#484f58" font-size="8">node reached by 2+ independent seed paths</text>

</svg>
