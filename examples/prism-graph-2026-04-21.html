.er{display:flex;align-items:center;gap:7px;font-size:11px;cursor:pointer;padding:2px 0;user-select:none}
.er input{accent-color:var(--accent);margin:0;flex-shrink:0}
.es{width:10px;height:10px;border-radius:2px;flex-shrink:0}

.ts{color:var(--accent);font-weight:600;margin-bottom:3px}.tt{color:#a1a1aa}
.note{font-size:10px;color:var(--muted);line-height:1.6;border-top:1px solid var(--border);padding-top:10px}

const elist=document.getElementById('elist');
for(const[t,c]of Object.entries(EC)){const l=document.createElement('label');l.className='er';l.innerHTML=`<input type="checkbox" checked data-e="${t}"><span class="es" style="background:${c}"></span><span>${t.replace(/_/g,' ')}</span>`;elist.appendChild(l);}
elist.addEventListener('change',()=>{at=new Set([...elist.querySelectorAll('input:checked')].map(e=>e.dataset.e));applyVis();});
const sl=document.getElementById('cs');
sl.addEventListener('input',()=>{document.getElementById('cv').textContent=parseFloat(sl.value).toFixed(2);applyVis();});
document.getElementById('sf').addEventListener('input',applyVis);
const nid=n=>typeof n==='object'?n.id:n;
const wrap=document.getElementById('graph-wrap');
const W=wrap.clientWidth,H=wrap.clientHeight;
const svg=d3.select('#graph').attr('width',W).attr('height',H);
const defs=svg.append('defs');
for(const[t,c]of Object.entries(EC)){defs.append('marker').attr('id','a-'+t).attr('viewBox','0 -4 10 8').attr('refX',22).attr('refY',0).attr('markerWidth',7).attr('markerHeight',7).attr('orient','auto').append('path').attr('d','M0,-4L10,0L0,4').attr('fill',c);}
const g=svg.append('g');
const nodes=DATA.nodes.map(d=>({...d}));
const links=DATA.links.map(d=>({...d}));
const r=d=>Math.max(6,6+Math.sqrt(d.degree||0)*2.8);
let lS=g.append('g').selectAll('line').data(links).join('line').attr('stroke',d=>EC[d.type]||'#555').attr('stroke-width',d=>Math.max(1.2,d.weight*3)).attr('stroke-opacity',d=>0.45+d.weight*0.45).attr('marker-end',d=>'url(#a-'+d.type+')');
const tip=document.getElementById('tip');
let nS=g.append('g').selectAll('circle').data(nodes).join('circle').attr('r',r).attr('fill',d=>sc(d.group)).attr('stroke','#0a0a0f').attr('stroke-width',1.5).attr('cursor','pointer')
  .call(d3.drag().on('start',(e,d)=>{if(!e.active)sim.alphaTarget(0.1).restart();d.fx=d.x;d.fy=d.y;}).on('drag',(e,d)=>{d.fx=e.x;d.fy=e.y;}).on('end',(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null;}))
  .on('mouseover',(e,d)=>{tip.innerHTML='<div class="ts">'+d.source+' p.'+(d.page||'?')+(d.section?' &middot; '+d.section:'')+'</div><div class="tt">'+(d.preview||'')+'</div>';tip.style.display='block';tip.style.left=(e.clientX+15)+'px';tip.style.top=(e.clientY-8)+'px';})
  .on('mousemove',e=>{tip.style.left=(e.clientX+15)+'px';tip.style.top=(e.clientY-8)+'px';})
  .on('mouseout',()=>tip.style.display='none');
const sim=d3.forceSimulation(nodes).force('link',d3.forceLink(links).id(d=>d.id).distance(100).strength(0.35)).force('charge',d3.forceManyBody().strength(-220)).force('center',d3.forceCenter(W/2,H/2)).force('collide',d3.forceCollide(d=>r(d)+5))
  .on('tick',()=>{lS.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);nS.attr('cx',d=>d.x).attr('cy',d=>d.y);});
const zoom=d3.zoom().scaleExtent([0.03,10]).on('zoom',e=>g.attr('transform',e.transform));
svg.call(zoom);
function applyVis(){const minC=parseFloat(sl.value),sf=document.getElementById('sf').value.toLowerCase();const vis=new Set();nS.each(d=>{if(!sf||d.source.toLowerCase().includes(sf))vis.add(d.id);});nS.style('opacity',d=>vis.has(d.id)?null:0.04);lS.style('display',d=>{const s=nid(d.source),t=nid(d.target);return(at.has(d.type)&&d.confidence>=minC&&vis.has(s)&&vis.has(t))?null:'none';});}
